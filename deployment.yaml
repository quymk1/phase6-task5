apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: myapp-rollout
  labels:
    app: myapp
spec:
  replicas: 1
  strategy:
    canary:
      canaryService: myapp-canary # Trỏ tới Service Canary (đã định nghĩa trong service.yaml)
      stableService: myapp-stable # Trỏ tới Service Stable (đã định nghĩa trong service.yaml)
      # Luồng tăng tải và phân tích tự động
      steps:
      - setWeight: 5
      - pause: { duration: 1m }   # Chờ 1 phút ở mức 5% để hệ thống thu thập metrics ban đầu
      - setWeight: 25
      - pause: { duration: 2m }
      - setWeight: 50
      - pause: { duration: 2m }
      - setWeight: 100
  
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp-container
        image: nginxdemos/hello:plain-text # Image mẫu hiển thị thông tin text để bạn dễ test port-forward
        ports:
        - containerPort: 80
          name: http
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10